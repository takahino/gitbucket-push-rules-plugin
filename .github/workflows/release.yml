name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      # ubuntu-latest には sbt がプリインストールされていないためセットアップする
      - uses: sbt/setup-sbt@v1

      - name: Run tests
        run: sbt test

      - name: Build plugin jar
        run: sbt assembly

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/scala-2.13/gitbucket-push-rules-plugin-*.jar
          generate_release_notes: true
